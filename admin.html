<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administración - FinzaCore</title>
  <link rel="stylesheet" href="styles.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9437294844445415"
     crossorigin="anonymous"></script>
</head>
<body>
  
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">Finza<span>Admin</span></a>
      <div class="nav-links">
        <a href="index.html" target="_blank">Ver Sitio</a>
        <button onclick="localStorage.removeItem('token'); location.reload();" style="background: none; border: none; color: var(--text-muted); font-weight: 600; cursor: pointer;">Cerrar Sesión</button>
      </div>
    </div>
  </nav>

  <div id="login-screen" style="display: flex; height: 80vh; align-items: center; justify-content: center;">
    <form id="login-form" style="background: #fff; padding: 3rem; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center;">
      <h2 style="font-family: var(--font-head); margin-bottom: 2rem;">Acceso Admin</h2>
      <input type="password" id="login-pwd" placeholder="Contraseña Maestra" required>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
    </form>
  </div>

  <div id="admin-dashboard" style="display:none;" class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin: 4rem 0;">
      <div>
        <h1 style="font-family: var(--font-head); font-size: 2.5rem;">Panel de Control</h1>
        <p style="color: var(--text-muted);">Gestiona los artículos de la plataforma.</p>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Nuevo Artículo</button>
    </div>

    <div style="background: #fff; border-radius: 20px; border: 1px solid var(--border); overflow: hidden;">
      <table style="width: 100%; border-collapse: collapse;">
        <thead style="background: #f9fafb;">
          <tr>
            <th style="padding: 1.25rem; text-align: left; border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Artículo</th>
            <th style="padding: 1.25rem; text-align: left; border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Estado</th>
            <th style="padding: 1.25rem; text-align: right; border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Acciones</th>
          </tr>
        </thead>
        <tbody id="admin-body"></tbody>
      </table>
    </div>
  </div>

  <div id="editor-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2 id="modal-title" style="font-family: var(--font-head); margin-bottom: 2.5rem;">Editar Artículo</h2>
      <form id="editor-form">
        <input type="text" id="post-title" placeholder="Título del artículo" required>
        <input type="text" id="post-category" placeholder="Categoría (Finanzas, Tecnología...)" required>
        <input type="url" id="post-cover" placeholder="URL de la imagen de portada">
        <textarea id="post-summary" placeholder="Resumen corto para la tarjeta" required></textarea>
        <textarea id="post-content" placeholder="Contenido en Markdown" required style="height: 300px;"></textarea>
        <div style="margin-bottom: 2rem;">
          <label style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); font-weight: 600;">
            <input type="checkbox" id="post-published" checked style="width: auto; margin: 0;"> Publicar inmediatamente
          </label>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 1rem;">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

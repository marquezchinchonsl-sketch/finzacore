<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando... - FinzaCore</title>
  
  <!-- SEO Open Graph & JSON-LD se inyectan dinámicamente vía app.js -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- ========================================== -->
  <!-- 1. GOOGLE ADSENSE: SCRIPT AUTO-ADS EN HEAD -->
  <!-- ========================================== -->
  <!-- Para maximizar ingresos, pega aquí tu script general de AdSense (Auto-ads). -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9437294844445415" crossorigin="anonymous"></script>
</head>
<body>
  
  <nav class="navbar">
    <div class="navbar__container container">
      <a href="index.html" class="navbar__logo">FinzaCore</a>
      <div class="navbar__nav">
        <a href="index.html">← Volver</a>
      </div>
    </div>
  </nav>

  <!-- app.js reemplazará el contenido de main con el artículo y los anuncios In-article -->
  <main>
    <div class="container" style="padding: 10rem 0; text-align: center;">
      <div class="loader" style="border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
      <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
    </div>
  </main>

  <!-- ========================================================= -->
  <!-- 2. GOOGLE ADSENSE: MULTIPLEX O FOOTER ADS (RECOMENDADO) -->
  <!-- ========================================================= -->
  <!-- Un bloque de anuncios Multiplex aquí al final del artículo genera un CTR muy alto. -->
  <div class="container" style="max-width: 800px; margin-bottom: 4rem;">
    <div class="adsense-placeholder" style="min-height: 300px; background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 0.9rem;">
      [Inserta aquí tu código de AdSense Multiplex o In-feed para el final del artículo]
    </div>
  </div>

  <footer class="footer">
    <div class="container" style="text-align: center; color: var(--text-muted); padding: 2rem 0;">
      © 2026 FinzaCore · Todos los derechos reservados.
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>

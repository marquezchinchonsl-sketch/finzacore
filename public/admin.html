<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - FinzaCore</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-container { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-box { background: var(--bg-card); padding: 3rem; border-radius: var(--radius-lg); width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border-glass); box-shadow: var(--shadow-neon); }
    .login-box h2 { margin-bottom: 1.5rem; }
    #admin-dashboard { display: none; }
  </style>
</head>
<body>

  <!-- PANTALLA DE LOGIN -->
  <div id="login-screen" class="login-container">
    <form id="login-form" class="login-box">
      <h2>Inicia Sesión</h2>
      <div class="form-group">
        <input type="password" id="login-pwd" class="form-control" placeholder="Contraseña de admin" required>
      </div>
      <button type="submit" class="btn" style="width: 100%">Entrar</button>
      <p style="margin-top: 1rem; color: var(--text-muted); font-size: 0.85rem;"><a href="/">← Volver al blog</a></p>
    </form>
  </div>

  <!-- PANEL DE ADMINISTRADOR -->
  <div id="admin-dashboard" class="admin-layout">
    <aside class="sidebar">
      <div class="nav-logo" style="margin-bottom: 2rem;">Admin<span>Core</span></div>
      <a href="#" class="sidebar-link active">Gestión de Blogs</a>
      <a href="#" class="sidebar-link" onclick="openModal()">+ Crear Artículo</a>
      <a href="/" target="_blank" class="sidebar-link">🌐 Ver el blog</a>
      <button class="btn btn-danger" onclick="logoutAdmin()" style="margin-top: auto; width: 100%;">Cerrar sesión</button>
    </aside>

    <main class="admin-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2>Gestión de Artículos (Vanilla JS)</h2>
        <button class="btn" onclick="openModal()">+ Nuevo</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Título y Slug</th>
              <th>Estado</th>
              <th>Cat.</th>
              <th>Vistas</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="admin-table-body">
            <!-- Renderizado desde app.js -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- MODAL DE EDITOR -->
  <div id="editor-modal" class="modal">
    <form id="editor-form" class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Nuevo Artículo</h2>
        <button type="button" class="close-btn" onclick="closeModal()">×</button>
      </div>
      <div class="form-group">
        <label class="form-label">Título</label>
        <input type="text" id="post-title" class="form-control" required>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
          <label class="form-label">Categoría</label>
          <select id="post-category" class="form-control" required>
            <option>Finanzas</option>
            <option>Tecnología</option>
            <option>Inversión</option>
            <option>Economía</option>
            <option>Cripto</option>
            <option>General</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Imagen de portada URL</label>
          <input type="url" id="post-cover" class="form-control" placeholder="https://...">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Resumen (2 frases)</label>
        <input type="text" id="post-summary" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Contenido en Markdown básico (#, ##, **)</label>
        <textarea id="post-content" class="form-control" placeholder="Escribe tu artículo..." required></textarea>
      </div>
      <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
        <input type="checkbox" id="post-published" checked>
        <label for="post-published" class="form-label" style="margin: 0">Publicar de inmediato</label>
      </div>
      <div style="text-align: right; margin-top: 1.5rem;">
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn">Guardar</button>
      </div>
    </form>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
